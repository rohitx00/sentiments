services:
  # ─────────────────────────────────────────────────────────
  # 1. Flask Backend — Web Service
  # ─────────────────────────────────────────────────────────
  - type: web
    name: sentimentos-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python -c "import nltk; nltk.download('stopwords', quiet=True)"
    startCommand: gunicorn app:app --workers 2 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: FLASK_ENV
        value: production
      # Add your Twitter API keys here if needed
      # - key: BEARER_TOKEN
      #   sync: false

  # ─────────────────────────────────────────────────────────
  # 2. React Frontend — Static Site
  # ─────────────────────────────────────────────────────────
  - type: web
    name: sentimentos-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Set this to your backend's Render URL after first deploy, e.g.:
      # https://sentimentos-backend.onrender.com/api
      - key: VITE_API_URL
        value: https://sentimentos-backend.onrender.com/api
    routes:
      # SPA fallback — all routes serve index.html
      - type: rewrite
        source: /*
        destination: /index.html
